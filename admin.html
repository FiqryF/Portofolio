<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | CMS Premium</title>

    <script>
        // 🔐 PROTECT PAGE (WAJIB LOGIN)
        const token = localStorage.getItem("token");
        if (!token) {
            window.location.href = "admin-login.html";
        }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        
            
        .bg-animated-gradient {
            background: linear-gradient(-45deg, #050505, #121212, #262626, #121212);
            background-size: 400% 400%;
            animation: bg-gradient-slow 12s ease infinite;
            position: fixed;
            inset: 0;
            z-index: -2;
        }

        @keyframes bg-gradient-slow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .nebula {
            position: absolute;
            filter: blur(100px) grayscale(1);
            opacity: 0.15;
            animation: nebula 10s ease-in-out infinite alternate;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes nebula {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.2) translate(20px, -20px); }
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .input-glass:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(34, 211, 238, 0.4);
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.1);
            outline: none;
        }
        
        .glass-panel {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .premium-btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.4s ease;
        }
        .premium-btn:hover {
            border-color: rgba(255,255,255,0.4);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
        }
        
        .card-hover {
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(10px);
        }
        .card-hover:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.15);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            background: rgba(255,255,255,0.05);
        }

    </style>
</head>

<body class="h-screen flex overflow-hidden bg-black text-white font-sans relative">

    <div class="bg-animated-gradient"></div>
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="nebula w-[600px] h-[600px] bg-cyan-500/10 rounded-full top-[-10%] left-[-10%] animate-nebula" style="animation-delay: 0s;"></div>
        <div class="nebula w-[500px] h-[500px] bg-purple-500/10 rounded-full bottom-[-10%] right-[-10%] animate-nebula" style="animation-delay: -5s;"></div>
    </div>


    <!-- SIDEBAR -->
    <aside class="w-72 glass-panel border-r border-white/5 flex flex-col relative z-10">
        <div class="p-6 border-b border-white/5">
            <h1 class="font-black text-sm uppercase tracking-widest text-cyan-400">CMS PANEL</h1>
        </div>

        <nav class="flex-1 p-6 space-y-3">
            <button onclick="switchTab('home')"
                class="w-full text-left px-4 py-2 hover:bg-white/5 rounded-lg bg-white/10 text-cyan-400 font-bold border-l-2 border-cyan-400">Home (Hero)</button>
            <button onclick="switchTab('about')" class="w-full text-left px-4 py-2 hover:bg-white/5 rounded-lg">About
                (History)</button>
            <button onclick="switchTab('skills')"
                class="w-full text-left px-4 py-2 hover:bg-white/5 rounded-lg">Skills</button>
            <button onclick="switchTab('projects')"
                class="w-full text-left px-4 py-2 hover:bg-white/5 rounded-lg">Projects</button>
        </nav>

        <div class="p-6 border-t border-white/5">
            <button onclick="logout()"
                class="w-full bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white border border-red-500/20 py-3 rounded-xl font-bold text-xs uppercase transition-colors">
                Logout
            </button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 p-10 overflow-y-auto relative z-10">

        <h2 class="text-3xl font-black mb-8 uppercase tracking-tight" id="page-title">Home Editor</h2>

        <!-- HOME TAB (HERO) -->
        <div id="tab-home" class="tab-pane">
            <div class="glass-panel p-6 rounded-2xl border border-white/5 max-w-2xl">
                <form id="hero-form" onsubmit="saveHero(event)" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Title</label>
                        <input type="text" id="hero-title" class="w-full p-4 rounded-xl input-glass" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Subtitle</label>
                        <input type="text" id="hero-subtitle" class="w-full p-4 rounded-xl input-glass" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Description</label>
                        <textarea id="hero-desc" class="w-full p-4 rounded-xl input-glass h-32" required></textarea>
                    </div>
                    <button type="submit"
                        class="w-full premium-btn text-white py-4 rounded-xl font-black uppercase tracking-wider transition-colors">Save
                        Hero Changes</button>
                </form>
            </div>
        </div>

        <!-- ABOUT TAB -->
        <div id="tab-about" class="tab-pane hidden">
            <div class="glass-panel p-6 rounded-2xl border border-white/5 max-w-2xl mb-8">
                <h3 class="font-bold mb-4">Add About Item</h3>
                <form id="about-form" onsubmit="saveAbout(event)" class="space-y-4">
                    <input type="hidden" id="about-id">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Type</label>
                            <select id="about-type" class="w-full p-3 rounded-xl input-glass">
                                <option value="education" class="text-black">Education</option>
                                <option value="experience" class="text-black">Experience</option>
                                <option value="organization" class="text-black">Organization</option>
                                <option value="certification" class="text-black">Certification</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Year / Date</label>
                            <input type="text" id="about-year" class="w-full p-3 rounded-xl input-glass"
                                placeholder="e.g. 2021 - 2024" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Title
                            (Institution/Company/Org)</label>
                        <input type="text" id="about-title" class="w-full p-3 rounded-xl input-glass" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Subtitle
                            (Degree/Position)</label>
                        <input type="text" id="about-subtitle" class="w-full p-3 rounded-xl input-glass" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Description</label>
                        <textarea id="about-desc" class="w-full p-3 rounded-xl input-glass h-24" required></textarea>
                    </div>
                    <div class="flex gap-2">
                        <button type="submit"
                            class="flex-1 premium-btn text-white py-4 rounded-xl font-black uppercase transition-colors">Save
                            Item</button>
                        <button type="button" onclick="resetForm('about-form')"
                            class="px-6 border border-white/10 hover:bg-white/10 text-gray-300 py-4 rounded-xl font-bold transition-colors">Clear</button>
                    </div>
                </form>
            </div>

            <h3 class="font-bold mb-4 uppercase text-gray-500">Managed About Items</h3>
            <div class="grid gap-4" id="about-list">
                <!-- About items injected here -->
            </div>
        </div>

        <!-- SKILLS TAB -->
        <div id="tab-skills" class="tab-pane hidden">
            <div class="glass-panel p-6 rounded-2xl border border-white/5 max-w-2xl mb-8">
                <h3 class="font-bold mb-4">Add Skill</h3>
                <form id="skill-form" onsubmit="saveSkill(event)" class="space-y-4">
                    <input type="hidden" id="skill-id">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Category</label>
                            <select id="skill-category" class="w-full p-3 rounded-xl input-glass">
                                <option value="frontend" class="text-black">Frontend</option>
                                <option value="iot" class="text-black">IoT & Embedded</option>
                                <option value="tools" class="text-black">Dev Tools</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Skill Name</label>
                            <input type="text" id="skill-name" class="w-full p-3 rounded-xl input-glass" required>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button type="submit"
                            class="flex-1 premium-btn text-white py-4 rounded-xl font-black uppercase transition-colors">Save
                            Skill</button>
                        <button type="button" onclick="resetForm('skill-form')"
                            class="px-6 border border-white/10 hover:bg-white/10 text-gray-300 py-4 rounded-xl font-bold transition-colors">Clear</button>
                    </div>
                </form>
            </div>

            <h3 class="font-bold mb-4 uppercase text-gray-500">Managed Skills</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="skills-list">
                <!-- Skills injected here -->
            </div>
        </div>

        <!-- PROJECTS TAB -->
        <div id="tab-projects" class="tab-pane hidden">
            <div class="glass-panel p-6 rounded-2xl border border-white/5 max-w-2xl mb-8">
                <h3 class="font-bold mb-4">Add Project</h3>
                <form id="project-form" onsubmit="saveProject(event)" class="space-y-4">
                    <input type="hidden" id="project-id">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Project Title</label>
                        <input type="text" id="project-title" class="w-full p-3 rounded-xl input-glass" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Image URL</label>
                        <input type="text" id="project-image" class="w-full p-3 rounded-xl input-glass"
                            placeholder="https://...">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Tags
                            (comma-separated)</label>
                        <input type="text" id="project-tags" class="w-full p-3 rounded-xl input-glass"
                            placeholder="React, Node.js, WebGL" title="Pisahkan teknologi yang dipakai dengan koma">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Description</label>
                        <textarea id="project-desc" class="w-full p-3 rounded-xl input-glass h-24" required></textarea>
                    </div>
                    <div class="flex gap-2">
                        <button type="submit"
                            class="flex-1 premium-btn text-white py-4 rounded-xl font-black uppercase transition-colors">Save
                            Project</button>
                        <button type="button" onclick="resetForm('project-form')"
                            class="px-6 border border-white/10 hover:bg-white/10 text-gray-300 py-4 rounded-xl font-bold transition-colors">Clear</button>
                    </div>
                </form>
            </div>

            <h3 class="font-bold mb-4 uppercase text-gray-500">Managed Projects</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="projects-list">
                <!-- Projects injected here -->
            </div>
        </div>

    </main>

    <script>
        const API_BASE = "http://127.0.0.1:8001/api";

        document.addEventListener("DOMContentLoaded", () => {
            fetchHero();
            fetchAbout();
            fetchSkills();
            fetchProjects();
        });

        // --- UI UTILS ---
        
        function switchTab(tab) {
            document.querySelectorAll(".tab-pane").forEach(el => el.classList.add("hidden"));
            document.getElementById("tab-" + tab).classList.remove("hidden");

            // Update tab styles
            const navButtons = document.querySelectorAll("aside nav button");
            navButtons.forEach(btn => {
                btn.className = "w-full text-left px-4 py-2 hover:bg-white/5 rounded-lg transition-colors text-gray-400";
            });
            const activeBtn = Array.from(navButtons).find(b => b.getAttribute('onclick').includes(tab));
            if(activeBtn) {
                activeBtn.className = "w-full text-left px-4 py-2 rounded-lg bg-white/10 text-cyan-400 font-bold border-l-2 border-cyan-400 transition-all";
            }

            let titleMap = {

                'home': 'Home Editor',
                'about': 'About Editor',
                'skills': 'Skills Editor',
                'projects': 'Projects Editor'
            }
            document.getElementById("page-title").innerText = titleMap[tab];
        }

        function resetForm(formId) {
            const form = document.getElementById(formId);
            form.reset();
            const idField = form.querySelector('input[type="hidden"]');
            if (idField) idField.value = '';
        }

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "admin-login.html";
        }


        // --- HERO CRUD ---
        async function fetchHero() {
            try {
                const res = await fetch(`${API_BASE}/hero`);
                const data = await res.json();
                if (data) {
                    document.getElementById("hero-title").value = data.title || "";
                    document.getElementById("hero-subtitle").value = data.subtitle || "";
                    document.getElementById("hero-desc").value = data.description || "";
                }
            } catch (err) {
                console.error("Failed to load hero", err);
            }
        }

        async function saveHero(e) {
            e.preventDefault();
            const payload = {
                title: document.getElementById("hero-title").value,
                subtitle: document.getElementById("hero-subtitle").value,
                description: document.getElementById("hero-desc").value
            };

            await fetch(`${API_BASE}/hero/`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            alert("Hero updated!");
        }


        // --- ABOUT CRUD ---
        async function fetchAbout() {
            try {
                const res = await fetch(`${API_BASE}/about/`);
                const items = await res.json();
                const list = document.getElementById("about-list");
                list.innerHTML = "";
                items.forEach(item => {
                    list.innerHTML += `
                        <div class="card-hover p-4 rounded-xl flex justify-between items-center group">
                            <div>
                                <span class="text-[10px] bg-white/10 px-2 py-1 rounded text-white uppercase">${item.type}</span>
                                <span class="text-xs text-gray-500 ml-2 font-mono">${item.year}</span>
                                <h4 class="font-bold mt-2">${item.title}</h4>
                                <p class="text-sm text-gray-400">${item.subtitle}</p>
                            </div>
                            <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button onclick='editAbout(${JSON.stringify(item)})' class="p-2 bg-blue-500/20 text-blue-400 rounded-lg hover:bg-blue-500 hover:text-white transition-colors"><span class="material-symbols-outlined text-sm">edit</span></button>
                                <button onclick="deleteAPI('about', '${item._id}')" class="p-2 bg-red-500/20 text-red-500 rounded-lg hover:bg-red-500 hover:text-white transition-colors"><span class="material-symbols-outlined text-sm">delete</span></button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) { }
        }

        function editAbout(item) {
            document.getElementById("about-id").value = item._id;
            document.getElementById("about-type").value = item.type;
            document.getElementById("about-year").value = item.year;
            document.getElementById("about-title").value = item.title;
            document.getElementById("about-subtitle").value = item.subtitle;
            document.getElementById("about-desc").value = item.description;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function saveAbout(e) {
            e.preventDefault();
            const id = document.getElementById("about-id").value;
            const payload = {
                type: document.getElementById("about-type").value,
                year: document.getElementById("about-year").value,
                title: document.getElementById("about-title").value,
                subtitle: document.getElementById("about-subtitle").value,
                description: document.getElementById("about-desc").value
            };

            const method = id ? "PUT" : "POST";
            const url = id ? `${API_BASE}/about/${id}` : `${API_BASE}/about/`;

            await fetch(url, {
                method: method,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            resetForm("about-form");
            fetchAbout();
        }


        // --- SKILLS CRUD ---
        async function fetchSkills() {
            try {
                const res = await fetch(`${API_BASE}/skills/`);
                const items = await res.json();
                const list = document.getElementById("skills-list");
                list.innerHTML = "";
                items.forEach(item => {
                    list.innerHTML += `
                        <div class="card-hover p-4 rounded-xl flex justify-between items-center group">
                            <div>
                                <span class="text-[10px] bg-white/10 px-2 py-1 rounded text-white uppercase mb-2 inline-block">${item.category}</span>
                                <h4 class="font-bold">${item.name}</h4>
                            </div>
                            <div class="flex gap-2">
                                <button onclick='editSkill(${JSON.stringify(item)})' class="p-2 bg-blue-500/20 text-blue-400 rounded-lg hover:bg-blue-500 hover:text-white transition-colors opacity-0 group-hover:opacity-100"><span class="material-symbols-outlined text-sm">edit</span></button>
                                <button onclick="deleteAPI('skills', '${item._id}')" class="p-2 bg-red-500/20 text-red-500 rounded-lg hover:bg-red-500 hover:text-white transition-colors opacity-0 group-hover:opacity-100"><span class="material-symbols-outlined text-sm">delete</span></button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) { }
        }


        function editSkill(item) {
            document.getElementById("skill-id").value = item._id;
            document.getElementById("skill-category").value = item.category;
            document.getElementById("skill-name").value = item.name;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function saveSkill(e) {

            e.preventDefault();
            const payload = {
                category: document.getElementById("skill-category").value,
                name: document.getElementById("skill-name").value
            };

            const id = document.getElementById("skill-id").value;
            const method = id ? "PUT" : "POST";
            const url = id ? `${API_BASE}/skills/${id}` : `${API_BASE}/skills/`;
            await fetch(url, {
                method: method,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            resetForm("skill-form");
            fetchSkills();
        }


        // --- PROJECTS CRUD ---
        async function fetchProjects() {
            try {
                const res = await fetch(`${API_BASE}/projects/`);
                const items = await res.json();
                const list = document.getElementById("projects-list");
                list.innerHTML = "";
                items.forEach(item => {
                    list.innerHTML += `
                        <div class="card-hover p-4 rounded-xl group">
                            <div class="flex justify-between items-start mb-2">
                                <h4 class="font-bold">${item.title}</h4>
                                <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button onclick='editProject(${JSON.stringify(item)})' class="p-2 bg-blue-500/20 text-blue-400 rounded-lg hover:bg-blue-500 hover:text-white transition-colors"><span class="material-symbols-outlined text-sm">edit</span></button>
                                    <button onclick="deleteAPI('projects', '${item._id}')" class="p-2 bg-red-500/20 text-red-500 rounded-lg hover:bg-red-500 hover:text-white transition-colors"><span class="material-symbols-outlined text-sm">delete</span></button>
                                </div>
                            </div>
                            <p class="text-xs text-gray-500 line-clamp-2">${item.description}</p>
                            <div class="mt-4 flex flex-wrap gap-2">${item.tags.map(t => `<span class="px-2 py-1 bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 rounded-md text-[9px] uppercase font-bold tracking-widest">${t}</span>`).join('')}</div>
                        </div>
                    `;
                });
            } catch (err) { }
        }

        function editProject(item) {
            document.getElementById("project-id").value = item._id;
            document.getElementById("project-title").value = item.title;
            document.getElementById("project-image").value = item.image_url || "";
            document.getElementById("project-tags").value = item.tags.join(", ");
            document.getElementById("project-desc").value = item.description;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function saveProject(e) {
            e.preventDefault();
            const id = document.getElementById("project-id").value;
            const tagsInput = document.getElementById("project-tags").value;
            const tags = tagsInput.split(",").map(t => t.trim()).filter(t => t);

            const payload = {
                title: document.getElementById("project-title").value,
                image_url: document.getElementById("project-image").value,
                tags: tags,
                description: document.getElementById("project-desc").value
            };

            const method = id ? "PUT" : "POST";
            const url = id ? `${API_BASE}/projects/${id}` : `${API_BASE}/projects/`;

            await fetch(url, {
                method: method,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            resetForm("project-form");
            fetchProjects();
        }

        // --- GLOBAL DELETE ---
        async function deleteAPI(endpoint, id) {
            if (!confirm("Hapus item ini?")) return;
            await fetch(`${API_BASE}/${endpoint}/${id}`, { method: "DELETE" });

            if (endpoint === 'about') fetchAbout();
            if (endpoint === 'skills') fetchSkills();
            if (endpoint === 'projects') fetchProjects();
        }

    </script>
</body>

</html>
